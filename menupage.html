<!doctype html>
<html lang="en" data-theme="wireframe">

<head>

<body class="relative bg-base text-base-content text-sm sm:text-[15px] tracking-tight font-custom  w-screen">


    <main
        class="relative flex w-full justify-center min-h-screen items-start overflow-x-hidden *:transition-all *:duration-800 ">


        <div
            class="hero p-4 w-full min-h-screen bg-center bg-cover flex justify-center gap-2  bg-[url(abstract-background-with-flowing-waves-black-gold.webp)]">


            <div
                class="sec grid gap-2 grid-rows-3  grid-cols-1 md:grid-cols-3 md:grid-rows-1 w-full md:max-w-[50%]  *:min-h-100">

                <div
                    class="card flex flex-col justify-between p-2 border border-base-300/20 bg-black/10 blur-bg-1 backdrop-blur-sm will-change-auto h-full ">

                    <img src="Copilot_20260702_151111.png" alt="" class="p-img drop-shadow-sm drop-shadow-lime-400 grow">

                    <div class="p-desc text-base-100 uppercase flex gap-2 *:text-base justify-between mt-9">
                        <span class="p-name">lime</span>
                        <span class="price">29$</span>
                    </div>

                </div>

                <div
                    class="card p-2 flex flex-col justify-between  border border-base-300/20 bg-black/10 blur-bg-1 backdrop-blur-sm will-change-auto ">

                    <img src="Copilot_20260702_151211.png" alt="" class="p-img drop-shadow-sm drop-shadow-red-400 grow">

                    <div class="p-desc text-base-100 uppercase flex gap-2 *:text-base justify-between mt-9">
                        <span class="p-name">Red rose</span>
                        <span class="price">29$</span>
                    </div>

                </div>

                <div
                    class="card flex flex-col justify-between  p-2 border border-base-300/20 bg-black/10 blur-bg-1 backdrop-blur-sm will-change-auto ">

                    <img src="Copilot_20260702_152711.png" alt="" class="p-img drop-shadow-sm drop-shadow-amber-400 grow">

                    <div class="p-desc text-base-100 uppercase flex gap-2 *:text-base justify-between mt-9">
                        <span class="p-name">mango</span>
                        <span class="price">29$</span>
                    </div>

                </div>

            </div>


        </div>




    </main>




    <script type="module" src="/src/main.js">
    </script>

    <script type="module" src="/src/myscript.js"></script>
