    <title>Growing Line Nav</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Pseudo-element for bigger clickable area */
        .nav-link::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 100%;
            transform: translateY(-50%);
            padding: 14px;
            /* p-3.5 */
        }
    </style>
</head>
